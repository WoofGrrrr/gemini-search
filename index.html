<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting to Gemini...</title>
</head>
<body>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const query     = urlParams.get('q');

    if (query) {
      const targetUrl = 'https://gemini.google.com/app?q=' + encodeURIComponent(query);
      window.location.href = targetUrl;
    } else {
      document.body.textContent = 'No query found in the search parameters.';
    }
  </script>
</body>
</html>

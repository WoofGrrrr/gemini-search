<!DOCTYPE html>
  <html>
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=https://gemini.google.com/">
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const query  = params.get('q');
        if (query) {
          window.location.replace('https://gemini.google.com/?q=' + encodeURIComponent(query));
        }
      })();
    </script>
  </head>
  <body></body>
  </html>

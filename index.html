<!DOCTYPE html>
  <html>
  <head>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var query  = params.get('q');
      var target = 'https://gemini.google.com/';

      if (query) {
        // Force synchronous location replacement before frame paint
        window.location.replace(target + '?q=' + encodeURIComponent(query));
      } else {
        // If rapid-fire presses send an empty query or duplicate tab, kill the tab immediately
        window.location.replace(target);
        setTimeout(function () {
          window.close();
        }, 100);
      }
    })();
  </script>
  </head>
  </html>

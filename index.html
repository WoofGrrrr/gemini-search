<!DOCTYPE html>
<html>
<head>
<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var query  = params.get('q');
    var target = 'https://gemini.google.com/';

    if (query) {
      window.location.href = target + '?q=' + encodeURIComponent(query);
    } else {
      window.location.href = target;
    }
  })();
</script>
</head>
</html>
